<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="13">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#16161e"/>
    </linearGradient>
  </defs>

  <!-- Window frame -->
  <rect width="800" height="520" rx="12" fill="url(#bg)"/>
  <rect width="800" height="36" rx="12" fill="#24283b"/>
  <rect y="24" width="800" height="12" fill="#24283b"/>
  <circle cx="20" cy="18" r="6" fill="#f7768e"/>
  <circle cx="40" cy="18" r="6" fill="#e0af68"/>
  <circle cx="60" cy="18" r="6" fill="#9ece6a"/>
  <text x="400" y="22" fill="#565f89" text-anchor="middle" font-size="12">VS Code — Chat</text>

  <!-- User message -->
  <text x="24" y="64" fill="#565f89" font-size="11">You</text>
  <text x="24" y="84" fill="#c0caf5">How do I add authentication to my Express app?</text>

  <!-- Agent response -->
  <text x="24" y="116" fill="#7aa2f7" font-size="11">Copilot</text>
  <text x="24" y="136" fill="#a9b1d6">Here's how to set up JWT authentication with Express...</text>
  <text x="24" y="156" fill="#565f89">// ... complete answer with code examples ...</text>

  <!-- Divider -->
  <line x1="24" y1="180" x2="776" y2="180" stroke="#3b4261" stroke-width="1"/>

  <!-- Next Steps header -->
  <text x="24" y="208" fill="#e0af68" font-size="15" font-weight="bold">⚡ Next Steps</text>

  <!-- Suggestion 1 -->
  <rect x="24" y="222" width="752" height="36" rx="6" fill="#1f2335"/>
  <text x="40" y="244" fill="#9ece6a">🔧</text>
  <text x="62" y="244" fill="#c0caf5" font-weight="bold">Add refresh token rotation</text>
  <text x="290" y="244" fill="#565f89">— Prevents token theft; add a /refresh endpoint next to /login</text>

  <!-- Suggestion 2 -->
  <rect x="24" y="264" width="752" height="36" rx="6" fill="#1f2335"/>
  <text x="40" y="286" fill="#7aa2f7">🔍</text>
  <text x="62" y="286" fill="#c0caf5" font-weight="bold">Explore passport.js strategies</text>
  <text x="295" y="286" fill="#565f89">— OAuth2, SAML, and social login without reinventing auth</text>

  <!-- Suggestion 3 -->
  <rect x="24" y="306" width="752" height="36" rx="6" fill="#1f2335"/>
  <text x="40" y="328" fill="#bb9af7">📋</text>
  <text x="62" y="328" fill="#c0caf5" font-weight="bold">Resume: Rate limiting middleware</text>
  <text x="320" y="328" fill="#565f89">— You started this 2 days ago, still open in backlog</text>

  <!-- Suggestion 4 -->
  <rect x="24" y="348" width="752" height="36" rx="6" fill="#1f2335"/>
  <text x="40" y="370" fill="#e0af68">💡</text>
  <text x="62" y="370" fill="#c0caf5" font-weight="bold">Consider: Add RBAC with role hierarchies</text>
  <text x="365" y="370" fill="#565f89">— Goes beyond basic auth; future-proofs permissions</text>

  <!-- Suggestion 5 -->
  <rect x="24" y="390" width="752" height="36" rx="6" fill="#1f2335"/>
  <text x="40" y="412" fill="#73daca">✅</text>
  <text x="62" y="412" fill="#c0caf5" font-weight="bold">Quick win: Add helmet.js security headers</text>
  <text x="370" y="412" fill="#565f89">— One npm install, 2 lines of code, big security boost</text>

  <!-- Footer -->
  <text x="24" y="450" fill="#3b4261" font-style="italic" font-size="11">Your selections help me learn what matters to you.</text>

  <!-- Learning indicator -->
  <rect x="24" y="470" width="752" height="30" rx="6" fill="#1a1b26" stroke="#3b4261" stroke-width="1"/>
  <text x="40" y="490" fill="#565f89" font-size="11">📊 Learning: deep-dive selected 4/10 times → promoted to STRONG • display-count: 5 • format: standard</text>
</svg>
